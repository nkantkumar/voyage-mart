apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-journey
  namespace: default
  labels:
    app: voyage-journey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voyage-journey
  template:
    metadata:
      labels:
        app: voyage-journey
    spec:
      containers:
        - name: voyage-services
          image: gcr.io/your-gcp-project/voyage-services:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
            - containerPort: 8082
            - containerPort: 8083
          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal-frontend.default.svc.cluster.local:7233"
          resources:
            limits:
              cpu: "1500m"
              memory: "1536Mi"
            requests:
              cpu: "750m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: default
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8081
  selector:
    app: voyage-journey
  type: LoadBalancer
